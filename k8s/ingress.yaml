apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grpc-user-ingress
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
spec:
  ingressClassName: nginx
  rules:
  - host: grpc.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grpc-user
            port:
              number: 50051